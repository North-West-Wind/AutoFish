name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
          fetch-depth: 0

    - name: Compile with Java 25
      uses: xxanqw/compilation@v3
      with:
        java-version: "25"
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mod-artifacts
        path: ./**/versions/**/build/libs
